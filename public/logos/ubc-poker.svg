    <path d="M142 146c0-29 50-29 50 0 0 17-16 26-25 36-10-10-25-19-25-36z" fill="#b11232"/>
    <path d="M166 176l-23 44h47z" fill="#b11232"/>
  </g>

  <g transform="rotate(12 340 196)" filter="url(#lift)">
    <rect x="258" y="74" width="170" height="226" rx="28" fill="#ffffff"/>
    <rect x="258" y="74" width="170" height="226" rx="28" fill="none" stroke="#d8dee9" stroke-width="8"/>
    <circle cx="343" cy="148" r="24" fill="#071a33"/>
    <circle cx="316" cy="178" r="24" fill="#071a33"/>
    <circle cx="370" cy="178" r="24" fill="#071a33"/>
    <path d="M343 194l-27 58h54z" fill="#071a33"/>
  </g>

  <g filter="url(#lift)">
    <circle cx="256" cy="306" r="145" fill="url(#red)"/>
    <g fill="#fff7e8">
