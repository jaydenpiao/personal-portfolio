      <rect x="238" y="380" width="36" height="72" rx="12"/>
      <rect x="330" y="190" width="36" height="72" rx="12" transform="rotate(45 348 226)"/>
      <rect x="146" y="326" width="36" height="72" rx="12" transform="rotate(45 164 362)"/>
      <rect x="330" y="326" width="36" height="72" rx="12" transform="rotate(135 348 362)"/>
      <rect x="146" y="190" width="36" height="72" rx="12" transform="rotate(135 164 226)"/>
    </g>
    <circle cx="256" cy="306" r="92" fill="#071a33" stroke="#fff7e8" stroke-width="12"/>
  </g>

  <g filter="url(#lift)">
    <rect x="83" y="204" width="346" height="148" rx="46" fill="#fffaf0" stroke="#f6c15b" stroke-width="10"/>
