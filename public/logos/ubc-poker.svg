<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-labelledby="title desc">
  <title id="title">UBC Poker Club logo</title>
  <desc id="desc">Original compact UBC Poker Club badge with cards, chip colors, and bold UBC lettering.</desc>
  <defs>
    <linearGradient id="badge" x1="80" y1="58" x2="438" y2="456" gradientUnits="userSpaceOnUse">
      <stop stop-color="#081936"/>
      <stop offset="0.58" stop-color="#0a3f4a"/>
      <stop offset="1" stop-color="#12351f"/>
    </linearGradient>
    <linearGradient id="red" x1="110" y1="92" x2="390" y2="430" gradientUnits="userSpaceOnUse">
      <stop stop-color="#ff5b48"/>
      <stop offset="1" stop-color="#a40f2d"/>
    </linearGradient>
    <filter id="lift" x="-16%" y="-16%" width="132%" height="132%">
      <feDropShadow dx="0" dy="16" stdDeviation="18" flood-color="#020617" flood-opacity="0.34"/>
    </filter>
  </defs>

  <rect width="512" height="512" rx="112" fill="url(#badge)"/>
  <path d="M47 375c75-41 132-55 205-48 73 6 132-10 213-57v109c-67 39-139 55-215 49-78-7-131 9-203 50z" fill="#f6c15b" opacity="0.18"/>

